spring.datasource.url=jdbc:mysql://localhost:3306/biography_db
spring.datasource.username=root
spring.datasource.password=biography

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

app.auth.jwt-secret=${JWT_SECRET:dev-only-change-this-secret-before-production-please-keep-it-long}
app.auth.jwt-expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}
